[env:esp32dev]
platform = espressif32 @ 4.2.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200

build_flags = 
    -fpermissive ; allows old c++ code
    -Wno-write-strings ; allows old c++ code
    -D VID=0x303A
    -D PID=0x3000
    -D BLE_GAMEPAD_DEVICE_NAME="\"ESP32 Manette Gyroscope\""
    -D BLE_GAMEPAD_DEVICE_MANUFACTURER="\"Espressif\""
    -D BLE_GAMEPAD_AXIS_RESOLUTION=16
    -UPID

lib_deps = 
    lemmingdev/ESP32-BLE-Gamepad @ ^0.5.2
    h2zero/NimBLE-Arduino @ ^1.4.1
    electroniccats/MPU6050 @ ^1.3.1